name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        lua:
          - name: LuaJIT
            pkg: luajit
            dev_package: libluajit-5.1-dev
            interpreter: luajit
          - name: Lua 5.2
            pkg: lua5.2
            dev_package: liblua5.2-dev
            interpreter: lua5.2
          - name: Lua 5.3
            pkg: lua5.3
            dev_package: liblua5.3-dev
            interpreter: lua5.3
          - name: Lua 5.4
            pkg: lua5.4
            from_source: true
            lua_version: 5.4.8
            lua_minor: '5.4'
          - name: Lua 5.5
            pkg: lua5.5
            from_source: true
            lua_version: 5.5.0
            lua_minor: '5.5'

    name: Build & Test (${{ matrix.lua.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Base packages all rows need
          sudo apt-get install -y \
            build-essential \
            ninja-build \
            pkg-config \
            wayland-protocols \
            libwayland-dev \
            libxkbcommon-dev \
            libinput-dev \
            libdbus-1-dev \
            libdrm-dev \
            libgbm-dev \
            libpixman-1-dev \
            libudev-dev \
            libseat-dev \
            libxcb1-dev \
            libxcb-icccm4-dev \
            libxcb-composite0-dev \
            libxcb-render0-dev \
            libxcb-render-util0-dev \
            libxcb-res0-dev \
            libxcb-ewmh-dev \
            libxcb-xinput-dev \
            libxcb-util-dev \
            hwdata \
            libdisplay-info-dev \
            libliftoff-dev \
            lua-busted \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            libgirepository1.0-dev \
            gir1.2-pango-1.0 \
            gir1.2-gdk-3.0 \
            gir1.2-rsvg-2.0 \
            libxml2-dev \
            bison \
            foot \
            xterm \
            xwayland \
            zsh

      - name: Install Lua from apt
        if: ${{ ! matrix.lua.from_source }}
        run: |
          sudo apt-get install -y \
            ${{ matrix.lua.interpreter }} \
            ${{ matrix.lua.dev_package }} \
            lua-lgi

      - name: Upgrade meson
        run: pip install --upgrade --break-system-packages meson

      - name: Cache from-source Lua + lgi
        if: ${{ matrix.lua.from_source }}
        id: cache-lua-fromsource
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/lua-install
          key: lua-${{ matrix.lua.pkg }}-${{ matrix.lua.lua_version }}-lgi-v1-${{ runner.os }}

      - name: Build Lua and lgi from source
        if: ${{ matrix.lua.from_source && steps.cache-lua-fromsource.outputs.cache-hit != 'true' }}
        run: |
          sudo apt-get install -y libreadline-dev libgirepository1.0-dev

          # Build Lua from upstream tarball
          cd ~
          curl -sL https://www.lua.org/ftp/lua-${{ matrix.lua.lua_version }}.tar.gz | tar xz
          cd lua-${{ matrix.lua.lua_version }}
          make linux MYCFLAGS=-fPIC
          make install INSTALL_TOP=$HOME/lua-install

          # Generate pkg-config so meson resolves -Dlua_pkg=${{ matrix.lua.pkg }}.
          # -Wl,-E is required so lgi-check.c (statically linked with liblua.a)
          # exports its Lua symbols for lgi's dlopen'd .so to resolve.
          mkdir -p $HOME/lua-install/lib/pkgconfig
          cat > $HOME/lua-install/lib/pkgconfig/${{ matrix.lua.pkg }}.pc <<EOF
          prefix=$HOME/lua-install
          libdir=\${prefix}/lib
          includedir=\${prefix}/include

          Name: Lua
          Description: Lua ${{ matrix.lua.lua_version }}
          Version: ${{ matrix.lua.lua_version }}
          Libs: -L\${libdir} -llua -Wl,-E -lm -ldl
          Cflags: -I\${includedir}
          EOF

          # Build and install lgi from upstream master (lgi-devs/lgi#359
          # merged Lua 5.5 support). lgi's Makefile hard-sets LUA_VERSION=5.1
          # and requires LUA_CFLAGS externally (no pkg-config probe). Pass
          # both as make args so they override the Makefile's assignments.
          cd ~
          git clone --depth 1 https://github.com/lgi-devs/lgi.git
          cd lgi
          make LUA_VERSION=${{ matrix.lua.lua_minor }} \
            LUA_CFLAGS="-I$HOME/lua-install/include"
          make install LUA_VERSION=${{ matrix.lua.lua_minor }} \
            PREFIX=$HOME/lua-install

      - name: Cache deps
        id: cache-deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/deps-install
          key: deps-wayland-pixman-wlroots-v2-${{ runner.os }}

      - name: Build wayland, pixman, and wayland-protocols
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/deps-install

          # Build wayland 1.23.1
          cd ~
          git clone --depth 1 --branch 1.23.1 https://gitlab.freedesktop.org/wayland/wayland.git
          cd wayland
          meson setup build --prefix=$HOME/deps-install -Ddocumentation=false -Dtests=false
          ninja -C build
          ninja -C build install

          # Build pixman 0.44.2
          cd ~
          git clone --depth 1 --branch pixman-0.44.2 https://gitlab.freedesktop.org/pixman/pixman.git
          cd pixman
          meson setup build --prefix=$HOME/deps-install -Dtests=disabled -Ddemos=disabled
          ninja -C build
          ninja -C build install

          # Build wayland-protocols 1.41
          cd ~
          git clone --depth 1 --branch 1.41 https://gitlab.freedesktop.org/wayland/wayland-protocols.git
          cd wayland-protocols
          meson setup build --prefix=$HOME/deps-install -Dtests=false
          ninja -C build
          ninja -C build install

      - name: Build wlroots
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          export PKG_CONFIG_PATH=$HOME/deps-install/share/pkgconfig:$HOME/deps-install/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH
          cd ~
          git clone --depth 1 --branch 0.19.0 https://gitlab.freedesktop.org/wlroots/wlroots.git
          cd wlroots
          meson setup build --prefix=$HOME/deps-install -Dexamples=false -Dxwayland=enabled
          ninja -C build
          ninja -C build install

      - name: Set paths
        run: |
          echo "PATH=$HOME/deps-install/bin:$PATH" >> $GITHUB_ENV
          PKG_CFG="$HOME/deps-install/share/pkgconfig:$HOME/deps-install/lib/x86_64-linux-gnu/pkgconfig"
          if [ "${{ matrix.lua.from_source }}" = "true" ]; then
            PKG_CFG="$HOME/lua-install/lib/pkgconfig:$PKG_CFG"
            LUA_MINOR="${{ matrix.lua.lua_minor }}"
            echo "LUA_PATH=$HOME/lua-install/share/lua/$LUA_MINOR/?.lua;$HOME/lua-install/share/lua/$LUA_MINOR/?/init.lua;;" >> $GITHUB_ENV
            echo "LUA_CPATH=$HOME/lua-install/lib/lua/$LUA_MINOR/?.so;;" >> $GITHUB_ENV
            echo "LD_LIBRARY_PATH=$HOME/lua-install/lib:$HOME/deps-install/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          else
            echo "LD_LIBRARY_PATH=$HOME/deps-install/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          fi
          echo "PKG_CONFIG_PATH=$PKG_CFG:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Build somewm
        run: make build-test LUA_PKG=${{ matrix.lua.pkg }}

      - name: Run unit tests
        run: make test-unit

      - name: Run integration tests (non-spawning only)
        run: |
          # Exclude tests that need external apps or client spawning
          spawning=$(grep -rl 'require.*_client' tests/test-*.lua | xargs -I{} basename {})
          tests=$(find tests -name 'test-*.lua' -type f \
            ! -name 'test-xwayland-*' \
            ! -name 'test-layer-shell-*' \
            ! -name 'test-dbus-error.lua' \
            ! -name 'test-leak-client.lua' \
            ! -name 'test-transient-stacking.lua' \
            ! -name 'test-output-fake-screen.lua' \
            $(printf '! -name %s ' $spawning) \
            | sort)
          timeout 300 bash tests/run-integration.sh $tests
        timeout-minutes: 6
        env:
          SOMEWM: ./build-test/somewm
          SOMEWM_CLIENT: ./build-test/somewm-client
          HEADLESS: 1
          LIBSEAT_BACKEND: noop
          TEST_TIMEOUT: 45
